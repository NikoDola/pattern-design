<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pattern Designer — Checkerboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="sidebar">
    <h2>Pattern Designer</h2>
    <p class="subtitle">1000×1000 · 5 000 rects · checkerboard</p>

    <div id="mode-toggle">
      <button class="mode-btn active" data-mode="mask">Mask</button>
      <button class="mode-btn" data-mode="reverse">Reverse</button>
    </div>

    <div id="controls">
      <!-- sliders injected by JS -->
    </div>

    <div id="controls-divider">
      <span id="btn-equalise">=</span>
      <span id="btn-dice">⚂</span>
    </div>

    <div id="total-bar">
      <span>Total: <strong id="total-display">0%</strong></span>
      <div id="total-track"><div id="total-fill"></div></div>
    </div>

    <div id="actions">
      <button id="btn-generate">Generate</button>
      <button id="btn-reset">Reset</button>
    </div>

    <div id="circle-section">
      <div id="circle-header">
        <p class="section-label">Layers</p>
        <button id="btn-add-circle">+ Add</button>
      </div>
      <div id="circle-list"></div>
    </div>

    <div id="color-row">
      <label>Element color <input type="color" id="rect-color" value="#000000"></label>
      <label>BG color <input type="color" id="bg-color" value="#ffffff"></label>
    </div>

    <div id="shape-row">
      <p class="section-label">Element shape</p>
      <div id="shape-toggle">
        <button class="shape-btn active" data-shape="square">■ Square</button>
        <button class="shape-btn" data-shape="circle">● Circle</button>
      </div>
    </div>
  </div>

  <div id="canvas-wrap">
    <div id="artboard-mover">
      <svg id="artboard" width="1000" height="1000"></svg>
    </div>
    <div id="export-bar">
      <span class="export-bar-label">Export / Import</span>
      <div class="export-bar-btns">
        <button id="btn-download-svg" class="export-btn">SVG</button>
        <button id="btn-download-png" class="export-btn export-btn-ghost">PNG</button>
        <button id="btn-download-jpg" class="export-btn">JPG</button>
      </div>
      <input type="file" id="file-import" accept=".json" style="display:none">
      <button id="btn-import" class="export-btn export-btn-import">Upload JSON</button>
    </div>
  </div>

  <div id="right-panel">
    <div id="properties-panel">
      <!-- injected by JS -->
    </div>
  </div>

<script type="module" src="./pattern.js"></script>
</body>
</html>
